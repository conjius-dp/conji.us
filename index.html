    <script>
    // Mobile detection: touch device with share API support
    window._isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0) && !!navigator.share;

    // Share handler — track touch start/end to distinguish tap vs swipe
    var _shareTouchStart = null;
    document.addEventListener('touchstart', function(e) {
        var btn = e.target.closest('.share-btn');
        if (btn) {
            _shareTouchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else {
            _shareTouchStart = null;
        }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
        if (!_shareTouchStart) return;
        var btn = e.target.closest('.share-btn');
        if (!btn) { _shareTouchStart = null; return; }
        var end = e.changedTouches[0];
        var dx = Math.abs(end.clientX - _shareTouchStart.x);
        var dy = Math.abs(end.clientY - _shareTouchStart.y);
        _shareTouchStart = null;
        // If finger moved more than 10px, it's a swipe — let scroll happen
        if (dx > 10 || dy > 10) return;
        e.preventDefault();
        btn.classList.add('tapped');
        setTimeout(function() { btn.classList.remove('tapped'); }, 200);
        var url = btn.getAttribute('data-url');
        var name = btn.getAttribute('data-name');
        var format = btn.getAttribute('data-format');
        var platform = format.indexOf('Windows') !== -1 ? 'Windows' : 'macOS';
        navigator.share({
            title: name + ' ' + format,
            text: 'Check out the ' + platform + ' ' + format + ' build for ' + name,
            url: url
        }).catch(function() {});
    }, { passive: false });

        'midi-visu': '<div class="card-thumb"><svg class="midi-visu-svg" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" style="opacity:0;transition:opacity 0.3s ease"><rect width="500" height="200" fill="#111"/><circle cx="45" cy="38" r="22" fill="#e89a1a"/><circle cx="160" cy="33" r="12" fill="#a06000"/><circle cx="300" cy="45" r="30" fill="#d48300"/><circle cx="450" cy="36" r="15" fill="#b37200"/><circle cx="105" cy="100" r="18" fill="#c07800"/><circle cx="250" cy="95" r="32" fill="#e89a1a"/><circle cx="420" cy="100" r="10" fill="#a06000"/><circle cx="55" cy="158" r="20" fill="#d48300"/><circle cx="190" cy="155" r="25" fill="#b37200"/><circle cx="350" cy="162" r="8" fill="#c07800"/><circle cx="460" cy="158" r="18" fill="#e89a1a"/></svg></div>',
        'boostor': '<div class="card-thumb"><svg viewBox="0 0 570 200" xmlns="http://www.w3.org/2000/svg"><rect width="570" height="200" fill="#111"/><g opacity="0.3"><path id="boostor-wave-noisy" d="" fill="none" stroke="#7a5200" stroke-width="2"/></g><g transform="translate(285,88) scale(0.85)"><circle cx="0" cy="0" r="45" fill="none" stroke="#d48300" stroke-width="4"/><g id="boostor-ind" class="knob-indicator" style="transform-origin:0 0;transform:rotate(180deg)"><line x1="0" y1="15" x2="0" y2="30" stroke="#d48300" stroke-width="5" stroke-linecap="round"/></g><line x1="-39" y1="39" x2="-49" y2="49" stroke="#d48300" stroke-width="4" stroke-linecap="round"/><line x1="39" y1="39" x2="49" y2="49" stroke="#d48300" stroke-width="4" stroke-linecap="round"/><line x1="0" y1="-52" x2="0" y2="-62" stroke="#d48300" stroke-width="4" stroke-linecap="round"/><text x="-75" y="72" text-anchor="end" dominant-baseline="auto" fill="#d48300" font-family="Inconsolata,monospace" font-size="24" font-weight="600">\u2212</text><text x="-74" y="74" text-anchor="start" dominant-baseline="auto" fill="#d48300" font-family="Inconsolata,monospace" font-size="40" font-weight="300" transform="translate(0,74) scale(1,0.83) translate(0,-74)">\u221e</text><text x="62" y="72" text-anchor="middle" dominant-baseline="auto" fill="#d48300" font-family="Inconsolata,monospace" font-size="24" font-weight="600">+24</text><text x="0" y="-70" text-anchor="middle" dominant-baseline="auto" fill="#d48300" font-family="Inconsolata,monospace" font-size="22" font-weight="600">0</text><g transform="translate(0,90) scale(0.833) translate(0,-76)"><rect class="knob-pill" x="-58" y="60" width="116" height="32" rx="16" ry="16" fill="#d48300"/><text id="boostor-sign" x="-46" y="76" text-anchor="start" dominant-baseline="central" fill="#111" font-family="Inconsolata,monospace" font-size="22" font-weight="600">+</text><text id="boostor-val" x="-28" y="76" text-anchor="start" dominant-baseline="central" fill="#111" font-family="Inconsolata,monospace" font-size="22" font-weight="600">0.0</text><text x="48" y="76" text-anchor="end" dominant-baseline="central" fill="#111" font-family="Inconsolata,monospace" font-size="22" font-weight="600">dB</text></g></g></svg></div>',
        'tiptoe': (function() {

            var vw = 570, vh = 200;
            var pts = 160, x0 = 5, x1 = 565, w = x1 - x0, cy = 100, amp = 16;
            var noisy = 'M', clean = 'M';
            for (var i = 0; i <= pts; i++) {
                var t = i / pts;
                var x = (x0 + t * w).toFixed(1);
                var s = Math.sin(t * Math.PI * 4) * amp;
                clean += (i ? ' L' : '') + x + ',' + (cy - s).toFixed(1);
                var n = s + Math.sin(t*Math.PI*9.3)*amp*0.5 + Math.sin(t*Math.PI*14)*amp*0.6 + Math.sin(t*Math.PI*22)*amp*0.4 + Math.sin(t*Math.PI*31)*amp*0.35 + Math.sin(t*Math.PI*38)*amp*0.3 + Math.sin(t*Math.PI*47)*amp*0.24 + Math.sin(t*Math.PI*54)*amp*0.2 + Math.sin(t*Math.PI*66)*amp*0.16 + Math.sin(t*Math.PI*78)*amp*0.14 + Math.sin(t*Math.PI*93)*amp*0.1 + Math.sin(t*Math.PI*110)*amp*0.08 + Math.sin(t*Math.PI*134)*amp*0.12 + Math.sin(t*Math.PI*157)*amp*0.1 + Math.sin(t*Math.PI*189)*amp*0.09 + Math.sin(t*Math.PI*223)*amp*0.07 + Math.sin(t*Math.PI*271)*amp*0.06 + Math.sin(t*Math.PI*320)*amp*0.05;
                noisy += (i ? ' L' : '') + x + ',' + (cy - n).toFixed(1);

            // Tick line helper — compute (x,y) at a given knob angle in degrees
            // angle 0 = straight down, clockwise. Returns inner→outer line coords.
            function tickLine(angleDeg, r1, r2) {
                var rad = angleDeg * Math.PI / 180;
                var sx = -Math.sin(rad), cy2 = Math.cos(rad);
                return 'x1="' + (sx*r1).toFixed(0) + '" y1="' + (cy2*r1).toFixed(0) + '" x2="' + (sx*r2).toFixed(0) + '" y2="' + (cy2*r2).toFixed(0) + '"';
            }
            function tickText(angleDeg, r, label, anchor, dx, dy) {
                var rad = angleDeg * Math.PI / 180;
                var tx = -Math.sin(rad) * r + (dx || 0), ty = Math.cos(rad) * r + (dy || 0);
                return '<text x="' + tx.toFixed(0) + '" y="' + (ty + 6).toFixed(0) + '" text-anchor="' + (anchor || 'middle') + '" fill="#d48300" font-family="Inconsolata,monospace" font-size="22" font-weight="600">' + label + '</text>';

            return { min: minX, max: maxX };
        }

        var curStretch = 1;
        var targetStretch = 1;
        var stretchFrame = null;

        function renderStretch() {
            curStretch += (targetStretch - curStretch) * 0.06;
            if (Math.abs(curStretch - 1) < 0.001 && Math.abs(targetStretch - 1) < 0.001) curStretch = 1;
            brand.style.transform = 'translateX(' + fx + 'px) scaleX(' + curStretch + ')';
        }

        function setStretch(speedDelta) {
            targetStretch = 1 + Math.max(-0.5, Math.min(0.5, speedDelta * 0.5));
            if (!stretchFrame) startStretchLoop();
        }

        function startStretchLoop() {
            if (stretchFrame) return;
            function tick() {
                renderStretch();
                if (Math.abs(curStretch - targetStretch) < 0.001 && Math.abs(curStretch - 1) < 0.001) {
                    stretchFrame = null;
                    return;
                }
                stretchFrame = requestAnimationFrame(tick);
            }
            stretchFrame = requestAnimationFrame(tick);
        }

        function applyTransform() {
            brand.style.transform = 'translateX(' + fx + 'px) scaleX(' + curStretch + ')';
        }

        function startPhysics() {
            if (physFrame) return;
            function step() {
                if (dragging) { physFrame = null; return; }

                // higher friction near center, lower when far
                var centerDist = Math.abs(fx);
                var magnetRadius = window.innerWidth * 0.125;
                var t = Math.max(0, 1 - centerDist / magnetRadius);
                var localFriction = friction - t * 0.06;
                vel *= localFriction;

                // magnetic pull toward center (gradient: strong at center, zero at edge)
                vel -= fx * 0.012 * t;

                fx += vel;
                var speedDelta = Math.abs(vel) - Math.abs(prevVel);
                prevVel = vel;

                // elastic bounce off edges
                var bounds = getMinMax();
                if (fx < bounds.min) {
                    fx = bounds.min;
                    vel = Math.abs(vel) * bounce;
                } else if (fx > bounds.max) {
                    fx = bounds.max;
                    vel = -Math.abs(vel) * bounce;
                }

                setStretch(speedDelta);

                if (Math.abs(vel) < 0.2 && centerDist < 0.5) {
                    vel = 0;
                    fx = 0;
                    targetStretch = 1;
                    applyTransform();
                    physFrame = null;
                    return;
                }
                if (Math.abs(vel) < 0.05 && Math.abs(fx) < 0.5) {
                    vel = 0;
                    fx = 0;
                    targetStretch = 1;
                    applyTransform();
                    physFrame = null;
                    return;
                }
                physFrame = requestAnimationFrame(step);
            }
            physFrame = requestAnimationFrame(step);
        }

        function startDrag(x) {
            dragging = true;
            pressed = true;
            moved = false;
            lastX = x;
            startX = x;
            vel = 0;
            prevVel = 0;
            if (physFrame) { cancelAnimationFrame(physFrame); physFrame = null; }
            setStretch(0);
        }

        function moveDrag(x) {
            if (!dragging) return;
            var dx = x - lastX;
            if (Math.abs(x - startX) > 5) moved = true;
            var newVel = Math.max(-maxVel, Math.min(maxVel, dx));
            var speedDelta = Math.abs(newVel) - Math.abs(prevVel);
            prevVel = newVel;
            vel = newVel;
            lastX = x;
            fx += dx;

            // soft clamp during drag (allow slight overscroll)
            var bounds = getMinMax();
            if (fx < bounds.min) fx = bounds.min + (fx - bounds.min) * 0.3;
            if (fx > bounds.max) fx = bounds.max + (fx - bounds.max) * 0.3;

            setStretch(speedDelta);
        }

        function release() {
            if (!dragging) return;
            dragging = false;
            prevVel = vel;

            // snap back from overscroll
            var bounds = getMinMax();
            if (fx < bounds.min) { fx = bounds.min; vel = Math.abs(vel) * bounce; }
            if (fx > bounds.max) { fx = bounds.max; vel = -Math.abs(vel) * bounce; }

            applyTransform();

            pressed = false;
            startPhysics();
        }

        // touch events
        brand.addEventListener('touchstart', function(e) {
            startDrag(e.touches[0].clientX);
            e.preventDefault();
        }, { passive: false });
        brand.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            moveDrag(e.touches[0].clientX);
            e.preventDefault();
        }, { passive: false });
        brand.addEventListener('touchend', function() { release(); });
        brand.addEventListener('touchcancel', function() { release(); });

        // mouse events
        brand.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            startDrag(e.clientX);
            e.preventDefault();
        });
        window.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            moveDrag(e.clientX);
        });
        window.addEventListener('mouseup', function() {
            if (!dragging) return;
            release();
        });
    })();

    // Tiptoe waveform + knob animation
    (function() {
        var pts = 160, x0 = 5, x1 = 565, w = x1 - x0, cy = 100, amp = 16;
        var harmonics = [
            [9.3, 0.5], [14, 0.6], [22, 0.4], [31, 0.35], [38, 0.3],
            [47, 0.24], [54, 0.2], [66, 0.16], [78, 0.14], [93, 0.1],
            [110, 0.08], [134, 0.12], [157, 0.1], [189, 0.09], [223, 0.07],
            [271, 0.06], [320, 0.05]
        ];

        var xs = new Float32Array(pts + 1);
        var staticCleanY = new Float32Array(pts + 1);
        var staticNoisyY = new Float32Array(pts + 1);
        for (var i = 0; i <= pts; i++) {
            var t = i / pts;
            xs[i] = x0 + t * w;
            var s = Math.sin(t * Math.PI * 4) * amp;
            staticCleanY[i] = cy - s;
            var n = s;
            for (var h = 0; h < harmonics.length; h++) {
                n += Math.sin(t * Math.PI * harmonics[h][0]) * amp * harmonics[h][1];
            }
            staticNoisyY[i] = cy - n;
        }

        function getCleanY(i, ampMul) {
            var t = i / pts;
            return cy - Math.sin(t * Math.PI * 4) * amp * ampMul;
        }

        function getNoisyY(i, phase) {
            var t = i / pts;
            var n = Math.sin(t * Math.PI * 4) * amp;
            for (var h = 0; h < harmonics.length; h++) {
                n += Math.sin(t * Math.PI * harmonics[h][0] + phase * 12.0 * (h % 3 === 0 ? 1 : h % 3 === 1 ? -0.7 : 0.5)) * amp * harmonics[h][1];
            }
            return cy - n;
        }

        function buildPath(ys) {
            var d = 'M';
            for (var i = 0; i <= pts; i++) {
                d += (i ? ' L' : '') + xs[i].toFixed(1) + ',' + ys[i].toFixed(1);
            }
            return d;
        }

        // Threshold knob: norm 0→1 maps to 0.5x→5.0x (linear)
        function setThreshKnob(norm, indEl, valEl) {
            var angle = 45 + norm * 270;
            indEl.style.transform = 'rotate(' + angle + 'deg)';
            var val = 0.5 + norm * 4.5;
            valEl.textContent = val.toFixed(1);
        }

        // Reduction knob: norm 0→1 maps to -60dB→0dB (linear)
        function setReducKnob(norm, indEl, valEl) {
            var angle = 45 + norm * 270;
            indEl.style.transform = 'rotate(' + angle + 'deg)';
            var db = -60 + norm * 60;
            if (db > -0.05) {
                valEl.textContent = '0.0 dB';
            } else {
                valEl.textContent = '\u2212' + Math.abs(db).toFixed(1) + ' dB';
            }
        }

        function setupTiptoeAnim() {
            var cleanEl = document.querySelector('.tiptoe-clean');
            var noisyEl = document.querySelector('.tiptoe-noisy');
            if (!cleanEl || !noisyEl) return;
            var card = cleanEl.closest('.project-card');
            if (!card) return;

            // knob elements
            var threshInd = document.getElementById('tiptoe-thresh-ind');
            var threshVal = document.getElementById('tiptoe-thresh-val');
            var reducInd = document.getElementById('tiptoe-reduc-ind');
            var reducVal = document.getElementById('tiptoe-reduc-val');

            var active = false;
            var phase = 0;
            var animFrame = null;
            var fading = false;
            var phaseSpeed = 0;
            var curCleanY = new Float32Array(staticCleanY);
            var curNoisyY = new Float32Array(staticNoisyY);
            var knobT = 0;

            // Threshold default: 1.5x → norm = (1.5 - 0.5) / 4.5 ≈ 0.222
            var threshDefault = (1.5 - 0.5) / 4.5;
            // Reduction default: -30dB → norm = (-30 + 60) / 60 = 0.5
            var reducDefault = 0.5;

            // Current knob norms — lerped for smooth transitions
            var threshCur = threshDefault;
            var reducCur = reducDefault;

            // Set defaults
            if (threshInd && threshVal) setThreshKnob(threshDefault, threshInd, threshVal);
            if (reducInd && reducVal) setReducKnob(reducDefault, reducInd, reducVal);

            function tick() {
                var lerpRate = 0.08;
                if (fading) {
                    var done = true;
                    for (var i = 0; i <= pts; i++) {
                        curCleanY[i] += (staticCleanY[i] - curCleanY[i]) * 0.12;
                        curNoisyY[i] += (staticNoisyY[i] - curNoisyY[i]) * 0.12;
                        if (Math.abs(curCleanY[i] - staticCleanY[i]) > 0.05 ||
                            Math.abs(curNoisyY[i] - staticNoisyY[i]) > 0.05) done = false;
                    }
                    cleanEl.setAttribute('d', buildPath(curCleanY));
                    noisyEl.setAttribute('d', buildPath(curNoisyY));
                    // Smoothly fade knobs back to defaults
                    threshCur += (threshDefault - threshCur) * lerpRate;
                    reducCur += (reducDefault - reducCur) * lerpRate;
                    if (threshInd && threshVal) setThreshKnob(threshCur, threshInd, threshVal);
                    if (reducInd && reducVal) setReducKnob(reducCur, reducInd, reducVal);
                    var knobsDone = Math.abs(threshCur - threshDefault) < 0.002 &&
                                    Math.abs(reducCur - reducDefault) < 0.002;
                    if (done && knobsDone) {
                        for (var j = 0; j <= pts; j++) {
                            curCleanY[j] = staticCleanY[j];
                            curNoisyY[j] = staticNoisyY[j];
                        }
                        cleanEl.setAttribute('d', buildPath(staticCleanY));
                        noisyEl.setAttribute('d', buildPath(staticNoisyY));
                        threshCur = threshDefault;
                        reducCur = reducDefault;
                        if (threshInd && threshVal) setThreshKnob(threshDefault, threshInd, threshVal);
                        if (reducInd && reducVal) setReducKnob(reducDefault, reducInd, reducVal);
                        fading = false;
                        phase = 0;
                        knobT = 0;
                        animFrame = null;
                        return;
                    }
                    animFrame = requestAnimationFrame(tick);
                    return;
                }
                if (!active) { animFrame = null; return; }
                phaseSpeed += (0.025 - phaseSpeed) * 0.03;
                phase += phaseSpeed;
                var ampMul = Math.cos(phase);
                for (var i = 0; i <= pts; i++) {
                    var targetClean = getCleanY(i, ampMul);
                    var targetNoisy = getNoisyY(i, phase);
                    curCleanY[i] += (targetClean - curCleanY[i]) * 0.12;
                    curNoisyY[i] += (targetNoisy - curNoisyY[i]) * 0.12;
                }
                cleanEl.setAttribute('d', buildPath(curCleanY));
                noisyEl.setAttribute('d', buildPath(curNoisyY));
                // Animate knobs — lerp toward sine targets for smooth start
                knobT += (window.innerWidth <= 600) ? 0.05 : 0.01;
                var threshTarget = (Math.sin(knobT) + 1) / 2;
                var reducTarget = (Math.sin(knobT * 0.7 + 1.5) + 1) / 2;
                threshCur += (threshTarget - threshCur) * lerpRate;
                reducCur += (reducTarget - reducCur) * lerpRate;
                if (threshInd && threshVal) setThreshKnob(threshCur, threshInd, threshVal);
                if (reducInd && reducVal) setReducKnob(reducCur, reducInd, reducVal);
                animFrame = requestAnimationFrame(tick);
            }

            function activate() {
                if (active) return;
                active = true;
                fading = false;
                phaseSpeed = 0;
                if (!animFrame) animFrame = requestAnimationFrame(tick);
            }

            function deactivate() {
                active = false;
                fading = true;
                if (!animFrame) animFrame = requestAnimationFrame(tick);
            }

            card.addEventListener('mouseenter', activate);
            card.addEventListener('mouseleave', deactivate);
            card.addEventListener('touchstart', function() { activate(); }, { passive: true });
            card.addEventListener('touchend', function() { deactivate(); });
            card.addEventListener('touchcancel', function() { deactivate(); });
        }

        var check = setInterval(function() {
            if (document.querySelector('.tiptoe-clean')) {
                clearInterval(check);
                setupTiptoeAnim();
            }
        }, 100);
    })();

    // CivDecks logo animation
    (function() {
        function setup() {
            var logo = document.querySelector('.civdecks-logo');
            if (!logo) return;
            var card = logo.closest('.project-card');
            if (!card) return;

            var active = false;
            var phase = 0;
            var animFrame = null;
            var fading = false;
            var curScale = 1, curOpacity = 0.7;
            logo.style.opacity = '0.7';
            var speed = Math.PI / 480;

            function applyStyle() {
                logo.style.transform = 'scale(' + curScale + ')';
                logo.style.opacity = curOpacity;
            }

            function tick() {
                if (fading) {
                    curScale += (1 - curScale) * 0.08;
                    curOpacity += (0.7 - curOpacity) * 0.08;
                    applyStyle();
                    if (Math.abs(curScale - 1) < 0.001 && Math.abs(curOpacity - 0.7) < 0.001) {
                        curScale = 1; curOpacity = 0.7;
                        logo.style.transform = '';
                        logo.style.opacity = '0.7';
                        fading = false;
                        phase = 0;
                        animFrame = null;
                        return;
                    }
                    animFrame = requestAnimationFrame(tick);
                    return;
                }
                if (!active) { animFrame = null; return; }
                phase += speed;
                var t = (1 - Math.cos(phase)) / 2; // starts at 0, goes to 1 and back
                curScale = 1 + t * 0.15;
                curOpacity = 0.7 + t * 0.3;
                applyStyle();
                animFrame = requestAnimationFrame(tick);
            }

            function activate() {
                if (active) return;
                active = true;
                fading = false;
                if (!animFrame) animFrame = requestAnimationFrame(tick);
            }

            function deactivate() {
                active = false;
                fading = true;
                if (!animFrame) animFrame = requestAnimationFrame(tick);

    (function() {
        var NUM_VISIBLE = 7;
        var BUFFER = 2;

                t.setAttribute('font-size', String(BASE_FONT));

            card.addEventListener('mouseleave', deactivate);
            card.addEventListener('touchstart', function() { activate(); }, { passive: true });
            card.addEventListener('touchend', function() { deactivate(); });
            card.addEventListener('touchcancel', function() { deactivate(); });

        var tapStartX = 0, tapStartY = 0, tapMoved = false, tapActive = false;
        // continuous drag tracking
        var fingerDown = false, fingerX = 0, fingerY = 0;

        function isBgTarget(el) {
            var isMobile = window.innerWidth <= 600;
            while (el) {
                if (el.classList && (el.classList.contains('project-card') || el.classList.contains('footer-brand') ||
                    el.classList.contains('footer-links') || el.tagName === 'A' || el.tagName === 'BUTTON')) return false;
                // On mobile, exclude the entire card gallery area from snake forces
                if (isMobile && el.classList && (el.classList.contains('sections-wrapper') || el.classList.contains('sections-fade'))) return false;
                el = el.parentElement;
            }
            return true;
        }

        // one-shot impulse ripple (for tap)
        function applyRipple(cx, cy) {
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var drawY = p.y - scrollY * p.parallax;
                var dx = p.x - cx, dy = drawY - cy;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < RIPPLE_RADIUS && dist > 0.1) {
                    var falloff = 1 - dist / RIPPLE_RADIUS;
                    falloff = falloff * falloff;
                    var force = RIPPLE_STRENGTH * falloff;
                    var nx = dx / dist, ny = dy / dist;
                    p.vx += nx * force;
                    p.vy += ny * force;
                    var cross = dx * ny - dy * nx;
                    p.rotSpeed += (cross > 0 ? 1 : -1) * force * 0.002;
                    applyDeform(p, cx, cy, RIPPLE_RADIUS, 6);
                }
            }
        }

        // continuous push (called every frame while finger is down)
        var CONT_RADIUS = 150;
        function applyContinuousPush(cx, cy) {
            var CONT_STRENGTH = 0.8;
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var drawY = p.y - scrollY * p.parallax;
                var dx = p.x - cx, dy = drawY - cy;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONT_RADIUS && dist > 0.1) {
                    var falloff = 1 - dist / CONT_RADIUS;
                    falloff = falloff * falloff;
                    var force = CONT_STRENGTH * falloff;
                    var nx = dx / dist, ny = dy / dist;
                    p.vx += nx * force;
                    p.vy += ny * force;
                    var cross = dx * ny - dy * nx;
                    p.rotSpeed += (cross > 0 ? 1 : -1) * force * 0.0005;
                }
                // deform per-point even if snake center is outside push radius
                applyDeform(p, cx, cy, CONT_RADIUS, 3);
            }
        }

        function applyDeform(p, cx, cy, radius, strength) {
            var cosR = p.cosR, sinR = p.sinR;
            var px = p.x, py = p.y - scrollY * p.parallax;
            var t = p.time;
            for (var k = 0; k < p.nPts; k++) {
                // compute world position of this control point
                var lx = p.baseX[k] + fastSin(t * p.wFreqX[k] + p.wPhaseX[k]) * p.wAmpX[k] + p.pushX[k];
                var ly = p.baseY[k] + fastSin(t * p.wFreqY[k] + p.wPhaseY[k]) * p.wAmpY[k] + p.pushY[k];
                var wx = lx * cosR - ly * sinR + px;
                var wy = lx * sinR + ly * cosR + py;
                var dx = wx - cx, dy = wy - cy;
                var dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < radius && dist > 0.1) {
                    var falloff = 1 - dist / radius;
                    falloff = falloff * falloff;
                    var force = strength * falloff;
                    var nx = dx / dist, ny = dy / dist;
                    // convert force direction to local space
                    var flx = nx * cosR + ny * sinR;
                    var fly = -nx * sinR + ny * cosR;
                    p.pushVX[k] += flx * force;
                    p.pushVY[k] += fly * force;
                }
            }
        }

        document.addEventListener('mousedown', function(e) {
            if (!isBgTarget(e.target)) return;
            tapStartX = e.clientX; tapStartY = e.clientY; tapMoved = false; tapActive = true;
            fingerDown = true; fingerX = e.clientX; fingerY = e.clientY;
        });
        document.addEventListener('mousemove', function(e) {
            if (!tapActive) return;
            fingerX = e.clientX; fingerY = e.clientY;
            if (Math.abs(e.clientX - tapStartX) + Math.abs(e.clientY - tapStartY) > 10) tapMoved = true;
        });
        document.addEventListener('mouseup', function(e) {
            if (tapActive && !tapMoved) applyRipple(e.clientX, e.clientY);
            tapActive = false; fingerDown = false;
        });
        document.addEventListener('touchstart', function(e) {
            if (!isBgTarget(e.target)) return;
            var t = e.touches[0]; tapStartX = t.clientX; tapStartY = t.clientY; tapMoved = false; tapActive = true;
            fingerDown = true; fingerX = t.clientX; fingerY = t.clientY;
        }, { passive: true });
        document.addEventListener('touchmove', function(e) {
            if (!tapActive) return;
            var t = e.touches[0]; fingerX = t.clientX; fingerY = t.clientY;
            if (Math.abs(t.clientX - tapStartX) + Math.abs(t.clientY - tapStartY) > 10) tapMoved = true;
        }, { passive: true });
        document.addEventListener('touchend', function(e) {
            if (tapActive && !tapMoved) { var t = e.changedTouches[0]; applyRipple(t.clientX, t.clientY); }
            tapActive = false; fingerDown = false;
        });

        // update rotation cache every N frames (rotation is barely visible per-frame)
        var rotUpdateCounter = 0;

        function tick() {
            var w = cw, h = ch;
            ctx.clearRect(0, 0, w, h);

            // continuous finger push — like dragging through a puddle
            if (fingerDown && tapMoved) applyContinuousPush(fingerX, fingerY);

            var timeInc = isDragging ? 0.00025 : 0.0005;
            rotUpdateCounter++;
            var updateRot = (rotUpdateCounter & 3) === 0; // every 4th frame

            ctx.lineWidth = 3.0;

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                // friction on push velocity — decay back to base drift speed
                p.vx += (p.baseVX - p.vx) * 0.06;
                p.vy += (p.baseVY - p.vy) * 0.06;
                p.rotSpeed += (p.baseRotSpeed - p.rotSpeed) * 0.06;
                p.x += p.vx;
                p.y += p.vy;
                p.time += timeInc;

                // update rotation cache periodically
                if (updateRot) {
                    p.rot += p.rotSpeed * 4;
                    p.cosR = Math.cos(p.rot);
                    p.sinR = Math.sin(p.rot);
                }

                var drawY = p.y - scrollY * p.parallax;

                // respawn based on drawn position (accounts for parallax)
                var margin = p.size + 50;
                if (p.x < -margin || p.x > w + margin || drawY < -margin || drawY > h + margin) {
                    if (p.x < -margin) { p.x = w + p.size; p.y = rand(0, h) + scrollY * p.parallax; }
                    else if (p.x > w + margin) { p.x = -p.size; p.y = rand(0, h) + scrollY * p.parallax; }
                    else if (drawY < -margin) { p.y = (h + p.size) + scrollY * p.parallax; p.x = rand(0, w); }
                    else if (drawY > h + margin) { p.y = -p.size + scrollY * p.parallax; p.x = rand(0, w); }
                    var angle = Math.atan2(p.vy, p.vx) + rand(-0.4, 0.4);
                    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    p.vx = Math.cos(angle) * spd;
                    p.vy = Math.sin(angle) * spd;
                    drawY = p.y - scrollY * p.parallax;
                }

                if (drawY < -p.size - 150 || drawY > h + p.size + 150) continue;

                var t = p.time;
                var bx = p.baseX, by = p.baseY;
                var wpx = p.wPhaseX, wpy = p.wPhaseY;
                var wfx = p.wFreqX, wfy = p.wFreqY;
                var wax = p.wAmpX, way = p.wAmpY;
                var ppx = p.pushX, ppy = p.pushY;
                var pvx = p.pushVX, pvy = p.pushVY;
                var cosR = p.cosR, sinR = p.sinR;
                var px = p.x, py = drawY;

                // update push physics for all control points
                for (var k = 0; k < p.nPts; k++) {
                    pvx[k] *= PUSH_DAMPING;
                    pvy[k] *= PUSH_DAMPING;
                    ppx[k] += pvx[k];
                    ppy[k] += pvy[k];
                }

                ctx.strokeStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                var mx = bx[0] + ppx[0], my = by[0] + ppy[0];
                ctx.moveTo(mx * cosR - my * sinR + px, mx * sinR + my * cosR + py);
                for (var k = 1; k < p.nPts; k += 3) {
                    var x1 = bx[k]   + fastSin(t * wfx[k]   + wpx[k])   * wax[k]   + ppx[k];
                    var y1 = by[k]   + fastSin(t * wfy[k]   + wpy[k])   * way[k]   + ppy[k];
                    var x2 = bx[k+1] + fastSin(t * wfx[k+1] + wpx[k+1]) * wax[k+1] + ppx[k+1];
                    var y2 = by[k+1] + fastSin(t * wfy[k+1] + wpy[k+1]) * way[k+1] + ppy[k+1];
                    var x3 = bx[k+2] + fastSin(t * wfx[k+2] + wpx[k+2]) * wax[k+2] + ppx[k+2];
                    var y3 = by[k+2] + fastSin(t * wfy[k+2] + wpy[k+2]) * way[k+2] + ppy[k+2];
                    ctx.bezierCurveTo(
                        x1 * cosR - y1 * sinR + px, x1 * sinR + y1 * cosR + py,
                        x2 * cosR - y2 * sinR + px, x2 * sinR + y2 * cosR + py,
                        x3 * cosR - y3 * sinR + px, x3 * sinR + y3 * cosR + py
                    );
                }
                ctx.stroke();

            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(tick);
        }
        tick();
    })();
    // ── Boostor knob + waveform animation (hover only) ──
    (function() {
        function init() {
            var ind = document.getElementById('boostor-ind');
            var signEl = document.getElementById('boostor-sign');
            var valEl = document.getElementById('boostor-val');
            var waveNoisyEl = document.getElementById('boostor-wave-noisy');
            if (!ind || !signEl || !valEl) { setTimeout(init, 500); return; }

            var card = ind.closest('.project-card');
            if (!card) return;

            // Waveform constants — same structure as tiptoe background
            var wPts = 160, wx0 = 5, wx1 = 565, ww = wx1 - wx0, wcy = 100, wAmp = 30;
            var wHarmonics = [
                [9.3, 0.5], [14, 0.6], [22, 0.4], [31, 0.35], [38, 0.3],
                [47, 0.24], [54, 0.2], [66, 0.16], [78, 0.14], [93, 0.1]
            ];

            function buildNoisyPath(ampMul) {
                var d = 'M';
                for (var i = 0; i <= wPts; i++) {
                    var t = i / wPts;
                    var x = wx0 + t * ww;
                    var s = Math.sin(t * Math.PI * 4) * wAmp * ampMul;
                    for (var h = 0; h < wHarmonics.length; h++) {
                        s += Math.sin(t * Math.PI * wHarmonics[h][0]) * wAmp * wHarmonics[h][1] * ampMul;
                    }
                    var y = wcy - s;
                    d += (i ? ' L' : '') + x.toFixed(1) + ',' + y.toFixed(1);
                }
                return d;
            }

            var hovering = false;
            var fading = false;
            var raf = null;
            var animT = 0;
            var knobDefault = 0.5;
            var knobCur = knobDefault;
            var lerpRate = 0.08;

            function setKnob(norm) {
                // Line points down at 0deg; offset +45 so norm=0→45° (−∞), norm=0.5→180° (up/0dB), norm=1→315° (+24)
                var angle = 45 + norm * 270;
                ind.style.transform = 'rotate(' + angle + 'deg)';

                if (norm < 0.1) {
                    signEl.textContent = '\u2212';
                    valEl.textContent = '\u221e';
                } else if (norm < 0.5) {
                    var db = 135 * Math.log10(norm / 0.5);
                    if (db < -99.9) db = -99.9;
                    if (Math.abs(db) < 0.05) {
                        signEl.textContent = '';
                        valEl.textContent = '0.0';
                    } else {
                        signEl.textContent = '\u2212';
                        valEl.textContent = Math.abs(db).toFixed(1);
                    }
                } else if (norm > 0.9) {
                    signEl.textContent = '+';
                    valEl.textContent = '24.0';
                } else {
                    var db = (norm - 0.5) / 0.4 * 24;
                    if (db < 0.05) {
                        signEl.textContent = '';
                        valEl.textContent = '0.0';
                    } else {
                        signEl.textContent = '+';
                        valEl.textContent = Math.min(24, db).toFixed(1);
                    }
                }
            }

            // Default: 0 dB (norm 0.5, indicator pointing up)
            setKnob(knobDefault);
            // Set initial waveform — at 0dB default, half amplitude
            if (waveNoisyEl) waveNoisyEl.setAttribute('d', buildNoisyPath(knobDefault));

            function tick() {
                if (fading) {
                    knobCur += (knobDefault - knobCur) * lerpRate;
                    setKnob(knobCur);
                    if (waveNoisyEl) waveNoisyEl.setAttribute('d', buildNoisyPath(knobCur));
                    if (Math.abs(knobCur - knobDefault) < 0.002) {
                        knobCur = knobDefault;
                        setKnob(knobDefault);
                        if (waveNoisyEl) waveNoisyEl.setAttribute('d', buildNoisyPath(knobDefault));
                        fading = false;
                        animT = 0;
                        raf = null;
                        return;
                    }
                    raf = requestAnimationFrame(tick);
                    return;
                }
                if (!hovering) { raf = null; return; }
                animT += (window.innerWidth <= 600) ? 0.05 : 0.01;
                var target = (Math.sin(animT) + 1) / 2;
                knobCur += (target - knobCur) * lerpRate;
                setKnob(knobCur);
                if (waveNoisyEl) waveNoisyEl.setAttribute('d', buildNoisyPath(knobCur));
                raf = requestAnimationFrame(tick);
            }

            function activate() {
                hovering = true;
                fading = false;
                if (!raf) raf = requestAnimationFrame(tick);
            }
            function deactivate() {
                hovering = false;
                fading = true;
                if (!raf) raf = requestAnimationFrame(tick);
            }
            card.addEventListener('mouseenter', activate);
            card.addEventListener('mouseleave', deactivate);
            card.addEventListener('touchstart', function() { activate(); }, { passive: true });
            card.addEventListener('touchend', function() { deactivate(); });
            card.addEventListener('touchcancel', function() { deactivate(); });
        }
        init();
    })();

    // ── Music cards: remove target=_blank on mobile so universal links open native apps ──
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        var musicLinks = document.querySelectorAll('.music .project-card');
        for (var i = 0; i < musicLinks.length; i++) {
            musicLinks[i].removeAttribute('target');
        }
    }

    // ── Music card hover: random rotation on background ──
    (function() {
        var cards = document.querySelectorAll('.music .project-card');
        for (var i = 0; i < cards.length; i++) {
            (function(card) {
                var thumb = card.querySelector('.card-thumb');
                if (!thumb) return;
                card.addEventListener('mouseenter', function() {
                    var deg = (5 + Math.random() * 10) * (Math.random() < 0.5 ? -1 : 1);
                    thumb.style.setProperty('--thumb-rot', deg + 'deg');
                });
                card.addEventListener('mouseleave', function() {
                    thumb.style.setProperty('--thumb-rot', '0deg');
                });
            })(cards[i]);
        }
    })();
    </script>
