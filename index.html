        'C++': '#f34b7d', 'GDScript': '#355570', 'Python': '#3572A5',

    var CUSTOM_THUMBS = {

        'midi-visu': '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#111"/><circle cx="50" cy="40" r="22" fill="#e89a1a"/><circle cx="150" cy="35" r="12" fill="#a06000"/><circle cx="260" cy="48" r="30" fill="#d48300"/><circle cx="355" cy="38" r="15" fill="#b37200"/><circle cx="95" cy="100" r="18" fill="#c07800"/><circle cx="210" cy="95" r="32" fill="#e89a1a"/><circle cx="340" cy="105" r="10" fill="#a06000"/><circle cx="50" cy="158" r="20" fill="#d48300"/><circle cx="160" cy="155" r="25" fill="#b37200"/><circle cx="290" cy="165" r="8" fill="#c07800"/><circle cx="360" cy="160" r="18" fill="#e89a1a"/></svg></div>',
        'gain-knob': '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#111"/><g transform="translate(200,74)"><circle cx="0" cy="0" r="55" fill="none" stroke="#d48300" stroke-width="5"/><g class="knob-indicator" style="transform:rotate(45deg)"><line x1="0" y1="18" x2="0" y2="37" stroke="#d48300" stroke-width="6" stroke-linecap="round"/></g><line x1="-48" y1="48" x2="-58" y2="58" stroke="#d48300" stroke-width="5" stroke-linecap="round"/><line x1="48" y1="48" x2="58" y2="58" stroke="#d48300" stroke-width="5" stroke-linecap="round"/><text x="-72" y="91" text-anchor="middle" dominant-baseline="auto" fill="#d48300" font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="600">0</text><text x="72" y="91" text-anchor="middle" dominant-baseline="auto" fill="#d48300" font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="600">11</text></g></svg></div>',
        'denoiser': (function() {
            var pts = 160, x0 = 35, x1 = 365, w = x1 - x0, cy = 93, amp = 13;
            var noisy = 'M', clean = 'M';
            for (var i = 0; i <= pts; i++) {
                var t = i / pts;
                var x = (x0 + t * w).toFixed(1);
                // clean sine: 2 full cycles
                var s = Math.sin(t * Math.PI * 4) * amp;
                clean += (i ? ' L' : '') + x + ',' + (cy - s).toFixed(1);

                var n = s + Math.sin(t*Math.PI*9.3)*amp*0.5 + Math.sin(t*Math.PI*14)*amp*0.6 + Math.sin(t*Math.PI*22)*amp*0.4 + Math.sin(t*Math.PI*31)*amp*0.35 + Math.sin(t*Math.PI*38)*amp*0.3 + Math.sin(t*Math.PI*47)*amp*0.24 + Math.sin(t*Math.PI*54)*amp*0.2 + Math.sin(t*Math.PI*66)*amp*0.16 + Math.sin(t*Math.PI*78)*amp*0.14 + Math.sin(t*Math.PI*93)*amp*0.1 + Math.sin(t*Math.PI*110)*amp*0.08 + Math.sin(t*Math.PI*134)*amp*0.12 + Math.sin(t*Math.PI*157)*amp*0.1 + Math.sin(t*Math.PI*189)*amp*0.09 + Math.sin(t*Math.PI*223)*amp*0.07 + Math.sin(t*Math.PI*271)*amp*0.06 + Math.sin(t*Math.PI*320)*amp*0.05;
                noisy += (i ? ' L' : '') + x + ',' + (cy - n).toFixed(1);

        })()
    };

    // swipe system: progress 0 = code, 1 = music
    var progress = 0;
    var track = document.getElementById('sections-track');
    var toggle = document.getElementById('section-toggle');
    var togglePill = toggle.querySelector('::before'); // driven via style
    var btns = document.querySelectorAll('.toggle-btn');
    var wrapper = document.getElementById('sections-wrapper');
    var animFrame = null;
    var scrollCoasting = false;
    var coastStoppedFast = false;

    // stop scroll coasting on any touch or click; remember if it was fast
    document.addEventListener('touchstart', function() {
        coastStoppedFast = scrollCoasting;
        scrollCoasting = false;
    }, true);
    document.addEventListener('mousedown', function() {
        coastStoppedFast = scrollCoasting;
        scrollCoasting = false;
    }, true);
    // block link clicks if coast was stopped by this tap
    document.addEventListener('click', function(e) {
        if (coastStoppedFast && e.target.closest('a')) {
            e.preventDefault();
            e.stopPropagation();
            coastStoppedFast = false;
        }
    }, true);

    var PEEK = 0.9; // percentage of track width to peek — centers grid gap on screen

    var darkLayer = document.getElementById('toggle-dark-layer');

    function setProgress(p) {
        progress = Math.max(0, Math.min(1, p));
        var offset = PEEK + progress * (-(50 + PEEK * 2));
        track.style.transform = 'translateX(' + offset + '%)';
        toggle.style.setProperty('--pill-x', (progress * 100) + '%');
        var pillLeft = progress * 50;
        var pillRight = pillLeft + 50;
        darkLayer.style.clipPath = 'inset(0 ' + (100 - pillRight) + '% 0 ' + pillLeft + '%)';
        btns[0].classList.toggle('active', progress < 0.5);
        btns[1].classList.toggle('active', progress >= 0.5);
    }

    var isDragging = false;

    // static fade mask — never moves
    (function() {
        var fade = document.getElementById('sections-fade');
        var mask = 'linear-gradient(to right, transparent 0%, black 12.5%, black 87.5%, transparent 100%)';
        fade.style.maskImage = mask;
        fade.style.webkitMaskImage = mask;
    })();

    function animateTo(target) {
        if (animFrame) cancelAnimationFrame(animFrame);
        var start = progress;
        var startTime = performance.now();
        var dist = Math.abs(target - start);
        var duration = Math.max(150, dist * 300);
        function step(now) {
            var t = Math.min(1, (now - startTime) / duration);
            var eased = 1 - Math.pow(1 - t, 3);
            setProgress(start + (target - start) * eased);
            if (t < 1) animFrame = requestAnimationFrame(step);
        }
        animFrame = requestAnimationFrame(step);
    }

    // toggle button clicks disabled — handled by drag system tap detection

    // unified drag — works for mouse and touch via pointer events
    function makeDraggable(el, sign, getSensitivity) {
        var lastX = 0, lastY = 0, startProg = 0, moved = false;
        var activeId = -1, sensitivity = 600;
        var moveHistory = [];
        var startTouchX = 0, startTouchY = 0, hLocked = false, vLocked = false;
        var touchTarget = null;

        function endDrag(e) {
            if (activeId === -1) return;
            activeId = -1;
            isDragging = false;
            if (!moved && sign === 1) {
                animateTo(progress >= 0.5 ? 0 : 1);
                return;
            }
            if (!moved) {
                // handle tap — open links since preventDefault blocked native clicks
                if (touchTarget && ('ontouchstart' in window)) {
                    var link = touchTarget.closest('a');
                    var card = touchTarget.closest('.project-card');
                    if (link) {
                        window.open(link.href, link.target || '_blank');
                    } else if (card && card.tagName === 'A') {
                        window.open(card.href, card.target || '_blank');
                    } else if (card) {
                        // code cards: find the repo link
                        var repoLink = card.querySelector('.card-links a');
                        if (repoLink) window.open(repoLink.href, '_blank');
                    }
                }
                animateTo(progress >= 0.5 ? 1 : 0);
                return;
            }
            // vertical scroll momentum
            if (sign === -1 && moveHistory.length >= 2) {
                var velYPxMs = 0;
                for (var i = moveHistory.length - 1; i >= 1; i--) {
                    for (var j = i - 1; j >= 0; j--) {
                        var dt = moveHistory[i].t - moveHistory[j].t;
                        if (dt < 10 || dt > 150) continue;
                        var vy = (moveHistory[i].y - moveHistory[j].y) / dt;
                        if (Math.abs(vy) > Math.abs(velYPxMs)) velYPxMs = vy;
                    }
                }
                if (Math.abs(velYPxMs) > 0.1) {
                    var scrollVel = -velYPxMs * 10;
                    var scrollFriction = 0.92;
                    scrollCoasting = true;
                    function scrollCoast() {
                        if (!scrollCoasting) return;
                        window.scrollBy(0, scrollVel);
                        scrollVel *= scrollFriction;
                        if (Math.abs(scrollVel) < 2) { scrollCoasting = false; }
                        if (Math.abs(scrollVel) < 0.5) return;
                        requestAnimationFrame(scrollCoast);
                    }
                    requestAnimationFrame(scrollCoast);
                }
            }
            // snap based on swipe direction — small swipe is enough
            var target;
            var dragDelta = progress - startProg;
            if (Math.abs(dragDelta) > 0.05) {
                target = dragDelta > 0 ? 1 : 0;
            } else {
                target = progress >= 0.5 ? 1 : 0;
            }
            animateTo(target);
        }

        function startDrag(x, y, target) {
            if (window.innerWidth > 600 && (target.tagName === 'H3' || target.tagName === 'P') && target.closest('.projects .project-info')) return false;
            sensitivity = getSensitivity();
            if (animFrame) cancelAnimationFrame(animFrame);
            lastX = x;
            lastY = y;
            startProg = progress;
            moved = false;
            isDragging = true;
            activeId = 1;
            moveHistory = [];
            startTouchX = x;
            startTouchY = y;
            hLocked = false;
            vLocked = false;
            return true;
        }

        function moveDrag(x, y) {
            if (activeId === -1) return;
            var dx = x - lastX;
            var dy = y - lastY;
            if (!moved && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
            moved = true;
            lastX = x;
            lastY = y;
            // lock axes until total offset exceeds 40px threshold
            if (!hLocked && Math.abs(x - startTouchX) > 40) hLocked = true;
            if (!vLocked && Math.abs(y - startTouchY) > 40) vLocked = true;
            // slight acceleration on mobile (1.3x)
            var accel = window.innerWidth <= 600 ? 1.3 : 1;
            var delta = hLocked ? sign * dx * accel / sensitivity : 0;
            // record move for velocity calculation on release
            var now = performance.now();
            moveHistory.push({ x: x, y: y, t: now });
            if (moveHistory.length > 20) moveHistory.shift();
            setProgress(progress + delta);
            if (sign === -1 && vLocked && dy !== 0) window.scrollBy(0, -dy * accel);
        }

        // touch events (mobile — reliable on iOS)
        var lastTouchTime = 0;
        el.addEventListener('touchstart', function(e) {
            lastTouchTime = Date.now();
            touchTarget = e.target;
            var t = e.touches[0];
            if (startDrag(t.clientX, t.clientY, e.target)) {
                e.preventDefault();
            }
        }, { passive: false });

        el.addEventListener('touchmove', function(e) {
            if (activeId === -1) return;
            var t = e.touches[0];
            moveDrag(t.clientX, t.clientY);
            e.preventDefault();
        }, { passive: false });

        el.addEventListener('touchend', function(e) { endDrag(null); });
        el.addEventListener('touchcancel', function(e) { endDrag(null); });

        // mouse events (desktop only — skip synthetic mouse events after touch on iOS)
        el.addEventListener('mousedown', function(e) {
            if (Date.now() - lastTouchTime < 500) return;
            if (e.button !== 0) return;
            // clear any text selection on click
            var sel = window.getSelection();
            if (sel && sel.rangeCount && !sel.isCollapsed) {
                sel.removeAllRanges();
            }
            if (startDrag(e.clientX, e.clientY, e.target)) {
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', function(e) {
            if (activeId === -1) return;

    (function() {
        var ZERO_DEG = 45;
        var ELEVEN_DEG = 315;

        function setupKnobAnim() {
            var indicator = document.querySelector('.knob-indicator');
            if (!indicator) return;
            var card = indicator.closest('.project-card');
            if (!card) return;

            var currentDeg = ZERO_DEG;
            var targetDeg = ZERO_DEG;
            var velDeg = 0;
            var animFrame = null;
            var active = false;
            var phase = 0; // 0=idle, 1=going to 11, 2=hold at 11, 3=going to 0, 4=hold at 0
            var holdTimer = null;

            function applyRotation() {
                indicator.style.transform = 'rotate(' + currentDeg + 'deg)';
            }

            function springStep() {
                var stiffness = 0.02;
                var damping = 0.75;
                var accel = (targetDeg - currentDeg) * stiffness;
                velDeg += accel;
                velDeg *= damping;
                currentDeg += velDeg;
                applyRotation();

                if (Math.abs(velDeg) < 0.05 && Math.abs(targetDeg - currentDeg) < 0.1) {
                    currentDeg = targetDeg;
                    velDeg = 0;
                    applyRotation();
                    animFrame = null;
                    onSettled();
                    return;
                }
                animFrame = requestAnimationFrame(springStep);
            }

            function startSpring() {
                if (animFrame) cancelAnimationFrame(animFrame);
                animFrame = requestAnimationFrame(springStep);
            }

            function clearHold() {
                if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
            }

            function onSettled() {
                if (!active) return;
                if (phase === 1) {
                    // arrived at 11, hold
                    phase = 2;
                    holdTimer = setTimeout(function() {
                        if (!active) return;
                        phase = 3;
                        targetDeg = ZERO_DEG;
                        startSpring();
                    }, 600);
                } else if (phase === 3) {
                    // arrived at 0, hold
                    phase = 4;
                    holdTimer = setTimeout(function() {
                        if (!active) return;
                        phase = 1;
                        targetDeg = ELEVEN_DEG;
                        startSpring();
                    }, 600);
                }
            }

            function activate() {
                if (active) return;
                active = true;
                phase = 1;
                targetDeg = ELEVEN_DEG;
                startSpring();
            }

            function deactivate() {
                active = false;
                clearHold();
                phase = 0;
                targetDeg = ZERO_DEG;
                startSpring();
            }

            // desktop: hover
            card.addEventListener('mouseenter', activate);
            card.addEventListener('mouseleave', deactivate);
            // mobile: touch
            card.addEventListener('touchstart', function() { activate(); }, { passive: true });
            card.addEventListener('touchend', function() { deactivate(); });
            card.addEventListener('touchcancel', function() { deactivate(); });
        }

    // Denoiser waveform animation
    (function() {
        var pts = 160, x0 = 35, x1 = 365, w = x1 - x0, cy = 93, amp = 13;
        var harmonics = [
            [9.3, 0.5], [14, 0.6], [22, 0.4], [31, 0.35], [38, 0.3],
            [47, 0.24], [54, 0.2], [66, 0.16], [78, 0.14], [93, 0.1],
            [110, 0.08], [134, 0.12], [157, 0.1], [189, 0.09], [223, 0.07],
            [271, 0.06], [320, 0.05]
        ];

        function buildCleanPath(ampMul) {
            var clean = 'M';
            for (var i = 0; i <= pts; i++) {
                var t = i / pts;
                var x = (x0 + t * w).toFixed(1);
                var s = Math.sin(t * Math.PI * 4) * amp * ampMul;
                clean += (i ? ' L' : '') + x + ',' + (cy - s).toFixed(1);
            }
            return clean;
        }

        function buildNoisyPath(phase) {
            var noisy = 'M';
            for (var i = 0; i <= pts; i++) {
                var t = i / pts;
                var x = (x0 + t * w).toFixed(1);
                var n = Math.sin(t * Math.PI * 4) * amp;
                for (var h = 0; h < harmonics.length; h++) {
                    n += Math.sin(t * Math.PI * harmonics[h][0] + phase * 12.0 * (h % 3 === 0 ? 1 : h % 3 === 1 ? -0.7 : 0.5)) * amp * harmonics[h][1];
                }
                noisy += (i ? ' L' : '') + x + ',' + (cy - n).toFixed(1);
            }
            return noisy;
        }

        function setupDenoiserAnim() {
            var cleanPath = document.querySelector('.denoiser-clean');
            var noisyPath = document.querySelector('.denoiser-noisy');
            if (!cleanPath || !noisyPath) return;
            var card = cleanPath.closest('.project-card');
            if (!card) return;

            var active = false;
            var phase = 0;
            var animFrame = null;

            function tick() {
                if (!active) { animFrame = null; return; }
                phase += 0.025;
                var ampMul = Math.cos(phase);
                cleanPath.setAttribute('d', buildCleanPath(ampMul));
                noisyPath.setAttribute('d', buildNoisyPath(phase));
                animFrame = requestAnimationFrame(tick);
            }

            function activate() {
                if (active) return;
                active = true;
                if (!animFrame) animFrame = requestAnimationFrame(tick);
            }

            function deactivate() {
                active = false;
            }

            card.addEventListener('mouseenter', activate);
            card.addEventListener('mouseleave', deactivate);
            card.addEventListener('touchstart', function() { activate(); }, { passive: true });
            card.addEventListener('touchend', function() { deactivate(); });
            card.addEventListener('touchcancel', function() { deactivate(); });
        }

    })();

            var b = Math.round(0x00 * bright);
            var color = 'rgb(' + r + ',' + g + ',' + b + ')';
            var angle = rand(0, Math.PI * 2);
            var speed = rand(0.00375, 0.03125) * speedMul;
            var initRot = rand(0, 360) * Math.PI / 180;

            return {
                x: scatter ? rand(-size, w + size) : 0,
                y: scatter ? rand(-size, h + size) : 0,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: size,
                depth: depth,
                parallax: 0.1 + (1 - depth) * 0.6,
                rot: initRot,
                rotSpeed: rand(-0.01, 0.01) * Math.PI / 180,
                cosR: Math.cos(initRot),
                sinR: Math.sin(initRot),
                opacity: opacity,
                color: color,
                strokeWidth: 3.0,
                time: rand(0, 100),
                nPts: nPts,
                baseX: baseX, baseY: baseY,
                wPhaseX: wPhaseX, wPhaseY: wPhaseY,
                wFreqX: wFreqX, wFreqY: wFreqY,
                wAmpX: wAmpX, wAmpY: wAmpY
            };
        }

        // seed
        for (var i = 0; i < MAX_PARTICLES; i++) {
            particles.push(createParticle(true));
        }
        // sort deepest first so shallow snakes draw on top
        particles.sort(function(a, b) { return b.depth - a.depth; });

        window.addEventListener('scroll', function() { scrollY = window.scrollY; }, { passive: true });

        // cache dimensions to avoid layout thrashing
        var cw = window.innerWidth, ch = window.innerHeight;
        window.addEventListener('resize', function() { cw = window.innerWidth; ch = window.innerHeight; }, { passive: true });

        // update rotation cache every N frames (rotation is barely visible per-frame)
        var rotUpdateCounter = 0;

        function tick() {
            var w = cw, h = ch;
            ctx.clearRect(0, 0, w, h);

            var timeInc = isDragging ? 0.00025 : 0.0005;
            rotUpdateCounter++;
            var updateRot = (rotUpdateCounter & 3) === 0; // every 4th frame

            ctx.lineWidth = 3.0;

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.time += timeInc;

                // update rotation cache periodically
                if (updateRot) {
                    p.rot += p.rotSpeed * 4;
                    p.cosR = Math.cos(p.rot);
                    p.sinR = Math.sin(p.rot);
                }

                var drawY = p.y - scrollY * p.parallax;

                // respawn based on drawn position (accounts for parallax)
                var margin = p.size + 50;
                if (p.x < -margin || p.x > w + margin || drawY < -margin || drawY > h + margin) {
                    if (p.x < -margin) { p.x = w + p.size; p.y = rand(0, h) + scrollY * p.parallax; }
                    else if (p.x > w + margin) { p.x = -p.size; p.y = rand(0, h) + scrollY * p.parallax; }
                    else if (drawY < -margin) { p.y = (h + p.size) + scrollY * p.parallax; p.x = rand(0, w); }
                    else if (drawY > h + margin) { p.y = -p.size + scrollY * p.parallax; p.x = rand(0, w); }
                    var angle = Math.atan2(p.vy, p.vx) + rand(-0.4, 0.4);
                    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    p.vx = Math.cos(angle) * spd;
                    p.vy = Math.sin(angle) * spd;
                    drawY = p.y - scrollY * p.parallax;
                }

                if (drawY < -p.size - 150 || drawY > h + p.size + 150) continue;

                var t = p.time;
                var bx = p.baseX, by = p.baseY;
                var wpx = p.wPhaseX, wpy = p.wPhaseY;
                var wfx = p.wFreqX, wfy = p.wFreqY;
                var wax = p.wAmpX, way = p.wAmpY;
                var cosR = p.cosR, sinR = p.sinR;
                var px = p.x, py = drawY;

                ctx.strokeStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.moveTo(bx[0] * cosR - by[0] * sinR + px, bx[0] * sinR + by[0] * cosR + py);
                for (var k = 1; k < p.nPts; k += 3) {
                    var x1 = bx[k]   + fastSin(t * wfx[k]   + wpx[k])   * wax[k];
                    var y1 = by[k]   + fastSin(t * wfy[k]   + wpy[k])   * way[k];
                    var x2 = bx[k+1] + fastSin(t * wfx[k+1] + wpx[k+1]) * wax[k+1];
                    var y2 = by[k+1] + fastSin(t * wfy[k+1] + wpy[k+1]) * way[k+1];
                    var x3 = bx[k+2] + fastSin(t * wfx[k+2] + wpx[k+2]) * wax[k+2];
                    var y3 = by[k+2] + fastSin(t * wfy[k+2] + wpy[k+2]) * way[k+2];
                    ctx.bezierCurveTo(
                        x1 * cosR - y1 * sinR + px, x1 * sinR + y1 * cosR + py,
                        x2 * cosR - y2 * sinR + px, x2 * sinR + y2 * cosR + py,
                        x3 * cosR - y3 * sinR + px, x3 * sinR + y3 * cosR + py
                    );
                }
                ctx.stroke();

            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>

</body>
