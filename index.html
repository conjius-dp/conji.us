    <script>
    var GH_USER = 'conjius-dp';
    var GH_ICON = '<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>';
    var DEMO_ICON = '<svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7zM5 5a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-7h-2v7H5V7h7V5H5z"/></svg>';

    var LANG_COLORS = {
        'C++': '#f34b7d', 'GDScript': '#355570', 'Python': '#3572A5',
        'JavaScript': '#f1e05a', 'TypeScript': '#3178c6', 'Rust': '#dea584',
        'Go': '#00ADD8', 'Java': '#b07219', 'C#': '#178600', 'HTML': '#e34c26',
        'CSS': '#563d7c', 'Shell': '#89e051', 'Swift': '#F05138'
    };

    // custom SVG thumbnails for repos that don't have a social image
    var CUSTOM_THUMBS = {
        'CivDecks': '<div class="card-thumb" style="background:#0a0a0a"><img src="logo-civdecks.png" alt="CivDecks" style="width:60%;height:auto;object-fit:contain"></div>',
        'wav-decoder': '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#0a0a0a"/><text x="200" y="108" text-anchor="middle" fill="#d48300" font-family="Inter,sans-serif" font-size="16" font-weight="600" letter-spacing="2"><tspan opacity="0.08">-1024</tspan> <tspan opacity="0.18">8192</tspan> <tspan opacity="0.35">21504</tspan> <tspan opacity="0.7">32767</tspan> <tspan opacity="0.35">21504</tspan> <tspan opacity="0.18">8192</tspan> <tspan opacity="0.08">-1024</tspan></text></svg></div>',
        'midi-visu': '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#0a0a0a"/><circle cx="80" cy="55" r="35" fill="#d48300" opacity="0.12"/><circle cx="200" cy="130" r="28" fill="#d48300" opacity="0.25"/><circle cx="310" cy="60" r="42" fill="#d48300" opacity="0.08"/><circle cx="150" cy="145" r="22" fill="#d48300" opacity="0.18"/><circle cx="330" cy="155" r="18" fill="#d48300" opacity="0.3"/><circle cx="240" cy="45" r="15" fill="#d48300" opacity="0.15"/></svg></div>',
        'gain-knob': '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#0a0a0a"/><g transform="translate(200,100)"><circle cx="0" cy="0" r="55" fill="none" stroke="#d48300" stroke-width="4.0" opacity="0.5"/><line x1="18" y1="18" x2="37" y2="37" stroke="#d48300" stroke-width="5.0" stroke-linecap="round" opacity="0.8"/><text x="52" y="58" text-anchor="middle" fill="#d48300" font-family="Inter,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" opacity="0.5">11</text></g></svg></div>',
        'denoiser': '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#0a0a0a"/><path d="M40,100 L50,88 L60,108 L70,80 L80,112 L90,76 L100,106 L110,84 L120,116 L130,72 L140,110 L150,78 L160,118 L170,70 L180,108 L190,85 L200,120 L210,68 L220,112 L230,80 L240,116 L250,72 L260,106 L270,88 L280,118 L290,65 L300,108 L310,82 L320,115 L330,75 L340,110 L350,80 L360,100" fill="none" stroke="#d48300" stroke-width="1.6" opacity="0.25"/><path d="M40,100 Q120,78 200,92 Q280,112 360,100" fill="none" stroke="#d48300" stroke-width="5.0" opacity="0.6"/></svg></div>'
    };

    // swipe system: progress 0 = code, 1 = music
    var progress = 0;
    var track = document.getElementById('sections-track');
    var toggle = document.getElementById('section-toggle');
    var togglePill = toggle.querySelector('::before'); // driven via style
    var btns = document.querySelectorAll('.toggle-btn');
    var wrapper = document.getElementById('sections-wrapper');
    var animFrame = null;

    var PEEK = 1.5; // percentage of track width to peek

    function setProgress(p) {
        progress = Math.max(0, Math.min(1, p));
        // at 0: show peek of right section. at 1: show peek of left section.
        var offset = -PEEK + progress * (-(50 - PEEK * 2));
        track.style.transform = 'translateX(' + offset + '%)';
        toggle.style.setProperty('--pill-x', (progress * 100) + '%');
        // update button colors
        btns[0].style.color = progress < 0.5 ? 'var(--bg)' : 'var(--accent)';
        btns[1].style.color = progress >= 0.5 ? 'var(--bg)' : 'var(--accent)';
        btns[0].classList.toggle('active', progress < 0.5);
        btns[1].classList.toggle('active', progress >= 0.5);
    }

    function animateTo(target) {
        if (animFrame) cancelAnimationFrame(animFrame);
        var start = progress;
        var startTime = performance.now();
        var duration = 300;
        function step(now) {
            var t = Math.min(1, (now - startTime) / duration);
            // ease out cubic
            t = 1 - Math.pow(1 - t, 3);
            setProgress(start + (target - start) * t);
            if (t < 1) animFrame = requestAnimationFrame(step);
        }
        animFrame = requestAnimationFrame(step);
    }

    // toggle button clicks
    btns[0].addEventListener('click', function() { animateTo(0); });
    btns[1].addEventListener('click', function() { animateTo(1); });

    // swipe handling for both content area and toggle
    function addSwipe(el, sensitivity, isToggle) {
        var startX = 0, startProgress = 0, dragging = false, moved = false;

        el.addEventListener('pointerdown', function(e) {
            if (e.button !== 0) return;
            startX = e.clientX;
            startProgress = progress;
            dragging = true;
            moved = false;
            if (animFrame) cancelAnimationFrame(animFrame);
            el.setPointerCapture(e.pointerId);
        });

        el.addEventListener('pointermove', function(e) {
            if (!dragging) return;
            var dx = e.clientX - startX;
            if (Math.abs(dx) > 8) moved = true;
            if (moved) {
                var delta = -dx / (sensitivity * 0.4);
                setProgress(startProgress + delta);
            }
        });

        el.addEventListener('pointerup', function(e) {
            if (!dragging) return;
            dragging = false;
            if (moved) {
                // snap with low threshold - 20% drag is enough to switch
                var target;
                if (startProgress < 0.5) {
                    target = progress > 0.2 ? 1 : 0;
                } else {
                    target = progress < 0.8 ? 0 : 1;
                }
                animateTo(target);
            } else if (isToggle) {
                // tap on toggle - figure out which side was tapped
                var rect = el.getBoundingClientRect();
                var tapX = e.clientX - rect.left;
                animateTo(tapX > rect.width / 2 ? 1 : 0);
            }
        });

        el.addEventListener('pointercancel', function() {
            if (!dragging) return;
            dragging = false;
            animateTo(progress >= 0.5 ? 1 : 0);
        });

        // prevent clicks on links/cards when swiping
        el.addEventListener('click', function(e) {
            if (moved) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);
    }

    // prevent native link/image drag inside swipeable areas
    wrapper.addEventListener('dragstart', function(e) { e.preventDefault(); });

    // content area: sensitivity = wrapper width (full swipe = full transition)
    addSwipe(wrapper, wrapper.offsetWidth || 600, false);
    // toggle: sensitivity = toggle width
    addSwipe(toggle, toggle.offsetWidth || 280, true);

    // init
    setProgress(0);

    // recalc on resize
    window.addEventListener('resize', function() {
        // just re-apply current progress
        setProgress(progress);
    });

    // pinned repos in display order (matches GitHub profile pins)
    var PINNED_REPOS = ['gain-knob', 'denoiser', 'CivDecks', 'midi-visu', 'wav-decoder'];

    function loadPinnedRepos() {
        fetchRepoDetails(PINNED_REPOS);
    }

    // static fallback data when API is rate-limited
    var FALLBACK = {
        'gain-knob': { description: 'Simple audio gain knob plugin with full DAW automation (VST3, AU, Standalone)', language: 'C++', homepage: null },
        'denoiser': { description: 'General-purpose spectral gating denoiser audio plugin (macOS VST3, AU, Standalone)', language: 'C++', homepage: null },
        'CivDecks': { description: 'Hex-based civilization strategy game with deckbuilding mechanics, built in Godot 4.6', language: 'GDScript', homepage: 'https://conji.us/civdecks/' },
        'midi-visu': { description: 'JUCE-based real-time MIDI visualizer plugin (VST3/AU/Standalone) with multiple visualization modes', language: 'C++', homepage: null },
        'wav-decoder': { description: 'A C++20 .wav file decoder', language: 'C++', homepage: null }
    };

    function fallbackRepo(name) {
        var fb = FALLBACK[name] || {};
        return {
            name: name,
            description: fb.description || '',
            url: 'https://github.com/' + GH_USER + '/' + name,
            homepageUrl: fb.homepage || null,
            primaryLanguage: fb.language ? { name: fb.language } : null
        };
    }

    // fetch details for specific repos in order
    function fetchRepoDetails(repoNames) {
        var promises = repoNames.map(function(name) {
            return fetch('https://api.github.com/repos/' + GH_USER + '/' + name)
                .then(function(r) { return r.json(); })
                .then(function(r) {
                    if (!r.name) return fallbackRepo(name); // rate-limited or error
                    return {
                        name: r.name,
                        description: r.description,
                        url: r.html_url,
                        homepageUrl: r.homepage,
                        openGraphImageUrl: null,
                        primaryLanguage: r.language ? { name: r.language } : null
                    };
                })
                .catch(function() { return fallbackRepo(name); });
        });
        Promise.all(promises).then(function(repos) {
            renderRepos(repos);
        });
    }

    function renderRepos(repos) {
        var grid = document.getElementById('projects-grid');
        grid.innerHTML = '';

        repos.forEach(function(repo) {
            var card = document.createElement('div');
            card.className = 'project-card';

            // thumbnail: custom SVG > social image > generated placeholder
            var thumb;
            if (CUSTOM_THUMBS[repo.name]) {
                thumb = CUSTOM_THUMBS[repo.name];
            } else if (repo.openGraphImageUrl && !repo.openGraphImageUrl.includes('opengraph.githubassets.com')) {
                thumb = '<img src="' + repo.openGraphImageUrl + '" alt="' + repo.name + '" loading="lazy">';
            } else {
                thumb = '<div class="card-thumb"><svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#0a0a0a"/><text x="200" y="108" text-anchor="middle" fill="#d48300" font-family="Inter,sans-serif" font-size="22" font-weight="600" opacity="0.3">' + repo.name + '</text></svg></div>';
            }

            // language
            var lang = repo.primaryLanguage ? repo.primaryLanguage.name : '';
            var langColor = LANG_COLORS[lang] || '#888';

            // links
            var PLAY_ICON = '<svg width="22" height="22" viewBox="0 0 10 12" fill="currentColor" style="margin-left:2px"><path d="M0 0v12l10-6z"/></svg>';
            var links = '<a href="' + repo.url + '" target="_blank" rel="noopener" title="Source">' + GH_ICON + '</a>';
            if (repo.homepageUrl) {
                links += '<a href="' + repo.homepageUrl + '" target="_blank" rel="noopener" title="Play in Browser">' + PLAY_ICON + '</a>';
            }

            card.innerHTML = thumb +
                '<div class="project-info">' +
                    '<h3>' + repo.name + '</h3>' +
                    '<p>' + (repo.description || '') + '</p>' +
                    '<div class="card-footer">' +
                        (lang ? '<span class="lang"><span class="lang-dot" style="background:' + langColor + '"></span>' + lang + '</span>' : '<span></span>') +
                        '<div class="card-links">' + links + '</div>' +
                    '</div>' +
                '</div>';

            card.addEventListener('click', function(e) {
                if (e.target.closest('a')) return;
                window.open(repo.url, '_blank');
            });

            grid.appendChild(card);
        });
    }

    loadPinnedRepos();
    </script>

</body>
